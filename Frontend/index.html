<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Premium technology company website built with React, Vite, Node.js, Express, and MySQL." />
    <meta name="theme-color" content="#0b1220" />
    <!-- Primary favicon (used as fallback) -->
    <link rel="icon" href="/logoanova.png" type="image/png" />
    <link rel="shortcut icon" href="/logoanova.png" type="image/png" />
    <!-- Multiple sizes (browsers pick the best one) -->
    <link rel="icon" type="image/png" sizes="64x64" href="/logoanova.png">
    <link rel="icon" type="image/png" sizes="48x48" href="/logoanova.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/logoanova.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/logoanova.png">
    <!-- High-res icons for pinned tabs / Android -->
    <link rel="icon" type="image/png" sizes="192x192" href="/logoanova.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/logoanova.png">
    <!-- Apple touch icon -->
    <link rel="apple-touch-icon" sizes="180x180" href="/logoanova.png">
    <!-- Safari pinned tab (mask icon) - uses monochrome SVG ideally -->
    <link rel="mask-icon" href="/logoanova.svg" color="#0b1220">
    <meta name="msapplication-TileColor" content="#0b1220" />
    <!-- Web manifest for mobile / PWA icons -->
    <link rel="manifest" href="/manifest.json">
    <title>ANOVA TECHNOLOGIES</title>
  </head>
  <body class="bg-slate-950 text-slate-100 antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
